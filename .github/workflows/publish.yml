name: Publish to npm

on:
  push:
    tags:
      # Per-package tags created by the auto-tag workflow: e.g. openclaw-v0.1.0
      - "*-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Derive package name from tag
        id: tag
        run: |
          # Tag format: {short-name}-v{version}  e.g. openclaw-v0.1.0
          TAG="${GITHUB_REF_NAME}"
          # Strip trailing -v{version} to get short name
          SHORT="${TAG%-v*}"
          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "Publishing package: $SHORT"

      - name: Publish matching package
        run: |
          SHORT="${{ steps.tag.outputs.short }}"
          PKG="packages/$SHORT"
          if [ -d "$PKG" ]; then
            echo "Publishing $PKG"
            npm publish --workspace "$PKG" --access public || echo "Already published at this version, skipping"
          else
            echo "No package directory found for '$SHORT', falling back to publishing all"
            for pkg in packages/node-sdk packages/js-sdk packages/nextjs packages/mcp packages/openclaw packages/openclaw-plugin; do
              [ -d "$pkg" ] && (npm publish --workspace "$pkg" --access public || echo "Skipping $pkg")
            done
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
